name: Daily AI Radar

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate source files
        run: npm run check

      - name: Run daily radar
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          MONGODB_DB_NAME: ${{ secrets.MONGODB_DB_NAME }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_MODEL_FALLBACKS: ${{ secrets.LLM_MODEL_FALLBACKS }}
          LLM_REQUEST_TIMEOUT_MS: ${{ secrets.LLM_REQUEST_TIMEOUT_MS }}
          RADAR_TARGET_URLS: ${{ secrets.RADAR_TARGET_URLS }}
        run: npm run radar
