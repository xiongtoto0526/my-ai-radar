name: Daily AI Radar

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Ensure history file exists
        run: |
          mkdir -p data
          if [ ! -f data/history.json ]; then
            printf '{\n  "updatedAt": null,\n  "items": []\n}\n' > data/history.json
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate source files
        run: npm run check

      - name: Run daily radar
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          WECHAT_WEBHOOK: ${{ secrets.WECHAT_WEBHOOK }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_MODEL_FALLBACKS: ${{ secrets.LLM_MODEL_FALLBACKS }}
          RADAR_TARGET_URLS: ${{ secrets.RADAR_TARGET_URLS }}
        run: npm run radar

      - name: Commit updated history
        run: |
          if git diff --quiet -- data/history.json; then
            echo "No history changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json
          git commit -m "chore: update radar history"
          git push
